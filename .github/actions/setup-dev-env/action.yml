name: Setup Dev Env
description: Set up Python, uv, and project dev dependencies.

inputs:
  python-version:
    description: Python version to install
    required: false
    default: "3.13"
  shared-package-token:
    description: Token used to read private shared py-lib Git sources.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}

    - name: Set up uv
      uses: astral-sh/setup-uv@v8.2.0
      with:
        enable-cache: auto

    - name: Install dependencies (dev)
      shell: bash
      env:
        SHARED_PACKAGE_TOKEN: ${{ inputs.shared-package-token }}
      run: |
        set -euo pipefail
        python_path="$(command -v python)"
        if [ -n "${SHARED_PACKAGE_TOKEN}" ]; then
          auth_header="$(printf 'x-access-token:%s' "${SHARED_PACKAGE_TOKEN}" | base64 | tr -d '\n')"
          printf '::add-mask::%s\n' "${auth_header}"
          GIT_CONFIG_COUNT=1 \
          GIT_CONFIG_KEY_0=http.https://github.com/.extraheader \
          GIT_CONFIG_VALUE_0="AUTHORIZATION: basic ${auth_header}" \
            uv sync --group dev --frozen --python "${python_path}"
        else
          uv sync --group dev --frozen --python "${python_path}"
        fi
